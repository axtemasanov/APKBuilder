name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew build

    - name: List files
      run: |
        find . -name "*.apk" -type f
        find . -name "*.jar" -type f

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-builder
        path: |
          **/*.apk
          **/*.jar
